# AgentRoom — production containers for the web app + the bridge daemon.
#
# This file builds and runs the two application services. Supabase is NOT bundled
# here — point the services at your Supabase instance via the variables in `.env`
# (see docs/SELF_HOSTING.md for the two supported modes and a self-hosted Supabase
# stack).
#
# Quick start:
#   cp .env.docker.example .env     # then fill in the values
#   docker compose up --build
#
# URL model (important):
#   • NEXT_PUBLIC_SUPABASE_URL is baked into the browser bundle at BUILD time and
#     must be reachable FROM THE BROWSER.
#   • SERVER_SUPABASE_URL is what the web server + bridge use FROM INSIDE THE
#     CONTAINER at runtime. (Both are required — Compose does not support a
#     variable-valued default, so set SERVER_SUPABASE_URL explicitly.)
#   For a production Supabase (a real https URL) set SERVER_SUPABASE_URL to the SAME
#   value as NEXT_PUBLIC_SUPABASE_URL. For a local `supabase start` on your host, set
#   NEXT_PUBLIC_SUPABASE_URL=http://localhost:54321 and
#   SERVER_SUPABASE_URL=http://host.docker.internal:54321. See docs/SELF_HOSTING.md.

services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        # Build-time, inlined into the client bundle + the CSP connect-src.
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:?set NEXT_PUBLIC_SUPABASE_URL in .env}
        NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY:?set NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY in .env}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
    image: agentroom-web
    ports:
      - '${WEB_PORT:-3000}:3000'
    environment:
      # Runtime: the server-side Supabase URL (route handlers / SSR / boot validation).
      NEXT_PUBLIC_SUPABASE_URL: ${SERVER_SUPABASE_URL:?set SERVER_SUPABASE_URL in .env (= NEXT_PUBLIC_SUPABASE_URL for a production Supabase)}
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:?set SUPABASE_SERVICE_ROLE_KEY in .env}
      EXTRA_ALLOWED_ORIGINS: ${EXTRA_ALLOWED_ORIGINS:-}
    # Liveness is provided by the image HEALTHCHECK (probes /api/health).
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    restart: unless-stopped

  bridge:
    build:
      context: .
      dockerfile: bridge/Dockerfile
    image: agentroom-bridge
    environment:
      SUPABASE_URL: ${SERVER_SUPABASE_URL:?set SERVER_SUPABASE_URL in .env (= NEXT_PUBLIC_SUPABASE_URL for a production Supabase)}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:?set SUPABASE_SERVICE_ROLE_KEY in .env}
      BRIDGE_WORKER_ID: ${BRIDGE_WORKER_ID:-bridge-compose-1}
      BRIDGE_POLL_INTERVAL_MS: ${BRIDGE_POLL_INTERVAL_MS:-2000}
      BRIDGE_MAX_CONCURRENT_RUNS: ${BRIDGE_MAX_CONCURRENT_RUNS:-3}
      BRIDGE_HEARTBEAT_INTERVAL_MS: ${BRIDGE_HEARTBEAT_INTERVAL_MS:-5000}
      BRIDGE_STALE_RUN_TIMEOUT_MS: ${BRIDGE_STALE_RUN_TIMEOUT_MS:-60000}
      BRIDGE_HEALTH_PORT: ${BRIDGE_HEALTH_PORT:-9090}
    # NOTE: this image runs the MOCK adapter only. Real agent CLIs (claude/codex)
    # are not present in the image — see the trust model in docs/SELF_HOSTING.md.
    # Liveness is provided by the image HEALTHCHECK (probes /healthz). The /healthz +
    # /metrics endpoints stay on the internal compose network (unauthenticated — do
    # NOT publish them publicly); scrape from a sidecar/Prometheus on this network.
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    restart: unless-stopped
