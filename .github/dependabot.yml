version: 2
updates:
  - package-ecosystem: npm
    directories:
      - "/"
      - "/apps/web"
      - "/bridge"
      - "/packages/shared"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      dev-dependencies:
        dependency-type: development
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
