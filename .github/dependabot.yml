version: 2
updates:
  # Single root entry only: this is a pnpm workspace with ONE root lockfile, so
  # scanning '/' updates dependencies across every package (apps/web, bridge,
  # packages/shared). Listing the sub-directories too made Dependabot open a
  # duplicate per-directory PR for every root PR (see closed #32–#38).
  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      # Fold all dev-dependency bumps (any semver level) into one PR.
      dev-dependencies:
        dependency-type: development
      # Fold production minor + patch bumps into one PR so routine updates don't
      # sprout a PR each. MAJOR production bumps are intentionally left ungrouped
      # so each lands as its own reviewable PR (e.g. React 19 / Next 16 — see the
      # tracked coordinated-upgrade issue).
      production-minor-patch:
        dependency-type: production
        update-types:
          - minor
          - patch
  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns:
          - '*'
