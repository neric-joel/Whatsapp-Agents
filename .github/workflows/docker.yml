name: Docker build

# Builds the production web + bridge images from the repo ROOT context and
# SMOKE-TESTS them (loads each into the daemon and runs the container) so a broken
# CMD / missing standalone file / unresolved entrypoint is caught here — not just
# whether the layers compile. No registry push.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-images:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4

      - name: Build web image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/web/Dockerfile
          load: true
          tags: agentroom-web:ci
          # Dummy build-time public env (inlined into the client bundle + CSP). NOT secrets.
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=http://localhost:54321
            NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=ci-dummy-publishable-key
            NEXT_PUBLIC_APP_URL=http://localhost:3000
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

      - name: Smoke-test web image (boots + serves /api/health)
        run: |
          docker run -d --name web -p 3000:3000 \
            -e NEXT_PUBLIC_SUPABASE_URL=http://localhost:54321 \
            -e NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=ci-dummy-publishable-key \
            -e SUPABASE_SERVICE_ROLE_KEY=ci-dummy-service-role-key \
            agentroom-web:ci
          ok=
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:3000/api/health >/dev/null 2>&1; then ok=1; break; fi
            sleep 2
          done
          echo "--- web logs ---"; docker logs web || true
          docker rm -f web >/dev/null 2>&1 || true
          [ "$ok" = "1" ] || { echo "::error::web image did not serve /api/health"; exit 1; }
          echo "web image boots and serves /api/health"

      - name: Build bridge image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: bridge/Dockerfile
          load: true
          tags: agentroom-bridge:ci
          cache-from: type=gha,scope=bridge
          cache-to: type=gha,mode=max,scope=bridge

      - name: Smoke-test bridge image (boots + stays up)
        run: |
          docker run -d --name bridge \
            -e SUPABASE_URL=http://localhost:54321 \
            -e SUPABASE_SERVICE_ROLE_KEY=ci-dummy-service-role-key \
            agentroom-bridge:ci
          sleep 6
          running=$(docker inspect -f '{{.State.Running}}' bridge 2>/dev/null || echo false)
          echo "--- bridge logs ---"; docker logs bridge || true
          docker rm -f bridge >/dev/null 2>&1 || true
          [ "$running" = "true" ] || { echo "::error::bridge image exited/crashed at startup"; exit 1; }
          echo "bridge image boots (tsx + entry resolve, env validation passes) and stays up"
