name: E2E Tests

# Trigger on pull requests and manual dispatch.
# This workflow is the e2e gate: it runs Playwright against the Next.js app.
#
# Scope decision (read before changing):
# ─────────────────────────────────────
# Standing up a fully seeded local Supabase instance in GitHub Actions is
# possible (the Supabase CLI supports `supabase start` on Linux runners) but
# adds ~2-3 minutes of setup and requires Docker-in-Docker. For the initial
# scaffold we split the work into two tiers:
#
#   Tier 1 — always runs (no backend needed):
#     auth.spec.ts  — unauthenticated redirect + form-rendering tests
#     chat.spec.ts  — "sign-in form interaction" describe block (error-path only)
#     a11y.spec.ts  — axe-core WCAG scan of /auth (fails on serious/critical)
#
#   Tier 2 — requires E2E_LIVE=1 + a seeded Supabase + bridge (NOT enabled here):
#     chat.spec.ts  — "chat journey" describe block
#
# To promote Tier 2 to CI, add the "start-supabase" and "start-bridge" steps
# below (marked TODO) and set E2E_LIVE: '1' in the env block.

on:
  workflow_dispatch:
  pull_request:

permissions:
  contents: read

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Playwright E2E (Chromium, auth tier)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      # ── Next.js build-time env (dummy values — app boots but Supabase calls fail) ──
      NEXT_PUBLIC_SUPABASE_URL: http://localhost:54321
      # CRITICAL: use PUBLISHABLE_KEY not ANON_KEY — see CLAUDE.md §7
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ci-dummy-publishable-key
      SUPABASE_SERVICE_ROLE_KEY: ci-dummy-service-role-key
      NEXT_PUBLIC_APP_URL: http://localhost:3000

      # ── Playwright settings ──
      CI: 'true'
      # Uncomment and set these to enable the full chat journey (Tier 2):
      # E2E_LIVE: '1'
      # E2E_EMAIL: ${{ secrets.E2E_EMAIL }}
      # E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ── Tier 2 TODO: start local Supabase ──────────────────────────────────────
      # Uncomment this block when promoting the chat journey to CI.
      # Requires Docker available on the runner (ubuntu-latest has Docker).
      #
      # - name: Install Supabase CLI
      #   uses: supabase/setup-cli@v1
      #   with:
      #     version: latest
      #
      # - name: Start local Supabase
      #   run: supabase start
      #
      # - name: Apply migrations and seed
      #   run: supabase db reset
      #
      # - name: Create E2E test user via Supabase admin API
      #   run: |
      #     curl -s -X POST http://localhost:54321/auth/v1/admin/users \
      #       -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
      #       -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
      #       -H "Content-Type: application/json" \
      #       -d "{\"email\":\"$E2E_EMAIL\",\"password\":\"$E2E_PASSWORD\",\"email_confirm\":true}"
      # ──────────────────────────────────────────────────────────────────────────

      # ── Tier 2 TODO: start bridge with mock adapter ───────────────────────────
      # Uncomment when promoting to Tier 2. The bridge uses MOCK_ONLY or the
      # BRIDGE_ADAPTER env to force the mock adapter regardless of agent config.
      #
      # - name: Start bridge (mock adapter, background)
      #   run: pnpm --filter bridge dev &
      #   env:
      #     SUPABASE_URL: http://localhost:54321
      #     SUPABASE_SERVICE_ROLE_KEY: ci-dummy-service-role-key
      #     BRIDGE_WORKER_ID: ci-bridge-1
      #     BRIDGE_POLL_INTERVAL_MS: 500
      #     BRIDGE_MAX_CONCURRENT_RUNS: 2
      # ──────────────────────────────────────────────────────────────────────────

      - name: Install Playwright browsers (Chromium only)
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Playwright tests
        run: pnpm exec playwright test
        # playwright.config.ts starts the Next.js dev server automatically.
        # webServer.reuseExistingServer is false in CI, so a fresh server starts here.

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload test results (traces + screenshots)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 7
