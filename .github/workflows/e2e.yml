name: E2E Tests

# Playwright against the local Next.js app. AgentRoom is a local, single-user app:
# no Supabase, no login, no Docker. The web server boots against an isolated temp
# AGENTROOM_HOME (set in playwright.config.ts) and seeds a fresh SQLite DB on first
# request, so these specs need no backend. The send→reply journey (chat.spec.ts) is
# gated behind E2E_LIVE (needs the bridge + a real CLI) and is skipped here.

on:
  workflow_dispatch:
  pull_request:

permissions:
  contents: read

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Playwright E2E (Chromium)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CI: 'true'
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node 22
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers (Chromium only)
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Playwright tests
        run: pnpm exec playwright test
        # playwright.config.ts starts the Next.js dev server (fresh in CI).

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload test results (traces + screenshots)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: test-results/
          retention-days: 7
